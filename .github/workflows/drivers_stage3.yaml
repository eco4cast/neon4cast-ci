on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

name: drivers-stage3

jobs:
  docker:
    runs-on: arc-runner-eco4cast
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      OSN_KEY: ${{ secrets.OSN_KEY }}
      OSN_SECRET: ${{ secrets.OSN_SECRET }}
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    container:
      image: eco4cast/rocker-neon4cast:latest
      options: --memory 45g
    steps:
      - uses: actions/checkout@v6

      - name: Refresh CA certificates
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates
          update-ca-certificates

      - name: Download Pseudo
        shell: Rscript {0}
        run: |
          source("drivers/download_psuedo.R")

      - name: Update Stage3
        shell: Rscript {0}
        run: |
          source("drivers/update_stage3.R")

      - name: Healthcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -m 10 --retry 5 https://hc-ping.com/cfa6fee0-6608-46f4-9cca-4e83445788fe
